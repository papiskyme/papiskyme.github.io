<!DOCTYPE html>
<html lang="zh">
<head>
 <meta charset="UTF-8">
 <title>Sky梦想网 - 爱心粒子</title>
 <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
    #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    /* 摄像头视频流默认隐藏，后续根据用户选择显示或隐藏 */
    .input_video { display: none; position: fixed; bottom: 10px; right: 10px; width: 200px; height: 150px; z-index: 100; border: 2px solid #fff; border-radius: 8px; }
    #loading {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: white; font-family: sans-serif; font-size: 24px; pointer-events: none; z-index: 10;
    }
    /* 网站标题和说明按钮 */
    #header {
        position: fixed; top: 0; left: 0; width: 100%; padding: 15px; z-index: 1000; display: flex; justify-content: space-between; align-items: center;
    }
    #site-title {
        color: #ff69b4; font-family: 'Arial', sans-serif; font-size: 24px; font-weight: bold;
    }
    #info-button {
        background-color: rgba(255, 105, 180, 0.8); color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-family: 'Arial', sans-serif;
        transition: background-color 0.3s ease;
    }
    #info-button:hover {
        background-color: rgba(255, 105, 180, 1);
    }
    /* 说明弹窗 */
    #info-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8); z-index: 2000; display: none; justify-content: center; align-items: center;
    }
    #info-content {
        background-color: #222; color: white; padding: 30px; border-radius: 10px; max-width: 600px; max-height: 80vh; overflow-y: auto;
    }
    #info-content h2 {
        color: #ff69b4; margin-top: 0;
    }
    #info-content p {
        margin: 10px 0;
    }
    #close-info {
        background-color: #ff69b4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;
    }
</style>
 <!-- 引入 Three.js -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 <!-- 引入 MediaPipe Hands -->
 <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="header">
    <div id="site-title">Sky梦想网</div>
    <button id="info-button">使用说明</button>
</div>
<div id="info-modal">
    <div id="info-content">
        <h2>使用说明</h2>
        <p><strong>手势控制：</strong></p>
        <p>握拳时，爱心粒子会逐渐聚合形成完整的爱心形状</p>
        <p>张开手掌时，爱心粒子会逐渐散开</p>
        <p>如果没有检测到手，粒子会缓慢散开</p>
        <p><strong>摄像头：</strong></p>
        <p>您可以选择是否显示摄像头画面</p>
        <p>摄像头画面会显示在右下角，大小为 200x150 像素</p>
        <p><strong>随机模式：</strong></p>
        <p>如果您选择不使用摄像头，系统会每 3 秒随机聚合或散开爱心粒子</p>
        <button id="close-info">关闭</button>
    </div>
</div>
<div id="loading">正在加载模型与摄像头...<br>请允许摄像头权限</div>
<div id="canvas-container"></div>
<video class="input_video"></video>

<script>
 // --- 0. 用户选择是否调用摄像头 --- 
 function askUserToUseCamera() {
     const userChoice = confirm('是否愿意调用摄像头进行手势控制？\n\n选择"确定"将使用摄像头进行手势控制，选择"取消"将进入随机效果展示模式。');
     
     if (userChoice) {
         // 用户选择使用摄像头
         document.getElementById('loading').textContent = '正在加载模型与摄像头...\n请允许摄像头权限';
         initCamera();
     } else {
         // 用户选择不使用摄像头，进入随机效果模式
         document.getElementById('loading').textContent = '正在加载模型...';
         initRandomMode();
     }
 }
 
 // 初始化摄像头模式
 function initCamera() {
     const videoElement = document.getElementsByClassName('input_video')[0];
     
     // 询问用户是否显示摄像头画面
     const showCamera = confirm('是否显示摄像头视频流？\n\n选择"确定"将显示摄像头画面，选择"取消"将隐藏摄像头画面。');
     if (showCamera) {
         videoElement.style.display = 'block';
     } else {
         videoElement.style.display = 'none';
     }
     
     // 初始化 MediaPipe Hands
     const hands = new Hands({locateFile: (file) => {
         return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
     }});
     
     hands.setOptions({
         maxNumHands: 1,
         modelComplexity: 1,
         minDetectionConfidence: 0.5,
         minTrackingConfidence: 0.5
     });
     
     hands.onResults(onResults);
     
     const cameraUtils = new Camera(videoElement, {
         onFrame: async () => {
             await hands.send({image: videoElement});
         },
         width: 640,
         height: 480
     });
     cameraUtils.start();
 }
 
 // 初始化随机模式
 function initRandomMode() {
     // 每3秒随机聚合或散开爱心
     setInterval(() => {
         targetGatherFactor = Math.random();
     }, 3000);
     
     // 隐藏加载消息
     document.getElementById('loading').style.display = 'none';
 }
 
 // 页面加载完成后显示弹窗
 window.onload = function() {
     // 初始化说明按钮事件
     document.getElementById('info-button').addEventListener('click', function() {
         document.getElementById('info-modal').style.display = 'flex';
     });
     
     document.getElementById('close-info').addEventListener('click', function() {
         document.getElementById('info-modal').style.display = 'none';
     });
     
     // 点击弹窗外部关闭
     document.getElementById('info-modal').addEventListener('click', function(e) {
         if (e.target === this) {
             this.style.display = 'none';
         }
     });
     
     // 开始询问用户是否使用摄像头
     askUserToUseCamera();
 };
 
 // --- 1. Three.js 场景初始化 ---
 const scene = new THREE.Scene();
 const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
 camera.position.z = 30;

 const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
 renderer.setSize(window.innerWidth, window.innerHeight);
 document.getElementById('canvas-container').appendChild(renderer.domElement);

 // --- 2. 创建爱心粒子系统 ---
 const particleCount = 3000; // 粒子数量
 const geometry = new THREE.BufferGeometry();
 const positions = new Float32Array(particleCount * 3);
 const targetPositions = new Float32Array(particleCount * 3); // 存储爱心形状的目标位置
 const randomPositions = new Float32Array(particleCount * 3); // 存储散开时的随机位置

 // 爱心方程函数
 function getHeartPosition(t, scale = 1) {
     const x = 16 * Math.pow(Math.sin(t), 3);
     const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
     const z = 0; 
     return { x: x * scale, y: y * scale, z: z * scale };
 }

 for (let i = 0; i < particleCount; i++) {
     // 生成爱心形状的目标点
     // 为了让爱心立体一点，我们随机分布t，并在Z轴加一点随机扰动
     const t = Math.random() * Math.PI * 2;
     const scale = 0.5; 
     const heartPos = getHeartPosition(t, scale);
     
     // 填充爱心内部 (随机缩放)
     const r = Math.sqrt(Math.random()); 
     
     targetPositions[i * 3] = heartPos.x * r;
     targetPositions[i * 3 + 1] = heartPos.y * r;
     targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 5; // Z轴厚度

     // 生成散开的随机位置 (爆炸效果)
     randomPositions[i * 3] = (Math.random() - 0.5) * 100;
     randomPositions[i * 3 + 1] = (Math.random() - 0.5) * 60;
     randomPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;

     // 初始位置设为散开状态
     positions[i * 3] = randomPositions[i * 3];
     positions[i * 3 + 1] = randomPositions[i * 3 + 1];
     positions[i * 3 + 2] = randomPositions[i * 3 + 2];
 }

 geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

 // 粒子材质
 const material = new THREE.PointsMaterial({
     color: 0xff69b4, // 热粉色
     size: 0.4,
     transparent: true,
     opacity: 0.8,
     blending: THREE.AdditiveBlending
 });

 const particles = new THREE.Points(geometry, material);
 scene.add(particles);

 // --- 3. 交互逻辑变量 ---
 let gatherFactor = 0; // 0 = 完全散开, 1 = 完全聚合成爱心
 let targetGatherFactor = 0; // 目标聚合度，由手势控制

 // --- 4. MediaPipe Hands 配置 ---
 function onResults(results) {
     document.getElementById('loading').style.display = 'none';

     if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
         const landmarks = results.multiHandLandmarks[0];

         // 计算手掌开合程度
         // 简单算法：计算拇指指尖(4)与其他四指指尖(8,12,16,20)到手腕(0)的平均距离
         const wrist = landmarks[0];
         const fingerTips = [4, 8, 12, 16, 20];
         let totalDist = 0;

         fingerTips.forEach(idx => {
             const tip = landmarks[idx];
             const dist = Math.sqrt(
                 Math.pow(tip.x - wrist.x, 2) + 
                 Math.pow(tip.y - wrist.y, 2)
             );
             totalDist += dist;
         });

         const avgDist = totalDist / 5;

         // 经验阈值：
         // 握拳时，指尖距离手腕很近 (avgDist 约 0.1 - 0.2)
         // 张开时，指尖距离手腕较远 (avgDist 约 0.4 - 0.6)
         // 我们做一个映射：握拳(distance small) -> 聚合(factor 1), 张开 -> 散开(factor 0)
         
         // 动态调整这些阈值以适应摄像头的距离
         const closeThreshold = 0.25; 
         const openThreshold = 0.5;

         let normalized = (avgDist - closeThreshold) / (openThreshold - closeThreshold);
         normalized = 1 - Math.min(Math.max(normalized, 0), 1); // 反转：距离越小(握拳)，值越大(1)

         targetGatherFactor = normalized; 

     } else {
         // 如果没有检测到手，默认缓慢散开
         targetGatherFactor = 0;
     }
 }

 // --- 5. 动画循环 ---
 function animate() {
     requestAnimationFrame(animate);

     // 粒子自身旋转动画
     particles.rotation.y += 0.002;

     // 平滑过渡聚合系数 (Lerp)
     gatherFactor += (targetGatherFactor - gatherFactor) * 0.05;

     // 更新粒子位置
     const posAttr = particles.geometry.attributes.position;
     const currentPositions = posAttr.array;

     for (let i = 0; i < particleCount; i++) {
         const idx = i * 3;
         
         // 目标位置插值：从 randomPositions 过渡到 targetPositions
         const tx = randomPositions[idx] + (targetPositions[idx] - randomPositions[idx]) * gatherFactor;
         const ty = randomPositions[idx+1] + (targetPositions[idx+1] - randomPositions[idx+1]) * gatherFactor;
         const tz = randomPositions[idx+2] + (targetPositions[idx+2] - randomPositions[idx+2]) * gatherFactor;

         // 增加一点动态浮动效果
         currentPositions[idx] += (tx - currentPositions[idx]) * 0.1;
         currentPositions[idx+1] += (ty - currentPositions[idx+1]) * 0.1;
         currentPositions[idx+2] += (tz - currentPositions[idx+2]) * 0.1;
     }

     posAttr.needsUpdate = true;
     renderer.render(scene, camera);
 }

 animate();

 // 窗口大小调整适配
 window.addEventListener('resize', () => {
     camera.aspect = window.innerWidth / window.innerHeight;
     camera.updateProjectionMatrix();
     renderer.setSize(window.innerWidth, window.innerHeight);
 });
</script>
</body>
</html>
